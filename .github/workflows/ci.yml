name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies (CPU-only torch)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pytest

      - name: Run test suite
        run: pytest tests/ -q
