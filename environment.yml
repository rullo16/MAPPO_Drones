name: mappo_drone_rl
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Versions are pinned to a known-compatible combination.
  # mlagents constrains numpy and protobuf, so loosen these with care.
  - python=3.10
  - numpy=1.23.*
  - matplotlib
  - tqdm
  - pytorch=2.2.*
  - torchvision        # used by PretrainFeatureExtraction.ipynb
  - ipykernel
  - pytest>=7
  - pip
  - pip:
    # Unity ML-Agents python bindings (interacts with the env builds)
    - mlagents==1.1.0
    # Experiment tracking
    - wandb==0.17.*
